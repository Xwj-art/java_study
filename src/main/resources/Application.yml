server:
  port: 8080 # 项目启动端口

spring:
  application:
    name: java-study-project

  # 1. 数据库连接配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/java_study?serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=utf-8
    username: root
    password:  # 填写你的数据库密码

# 2. MyBatis-Plus 配置 (取代了之前的 mybatis-config.xml)
mybatis-plus:
  # 如果有 Mapper XML 文件，放在 resources/mapper 目录下
  mapper-locations: classpath:/mapper/*.xml
  # 实体类所在包名，配置后在 XML 中可以直接写类名，不用写全路径
  type-aliases-package: com.example.entity
  configuration:
    # 开启驼峰命名自动转换（如数据库名 user_name -> 实体类字段 userName）
    map-underscore-to-camel-case: true
    # 打印 SQL 日志到控制台，方便调试
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 3. 日志配置
logging:
  level:
    root: info             # 全局：只打印重要信息（防止控制台被刷屏）
    org.example: debug     # 业务代码：打印详细信息（方便你看 SQL 和业务流转）
    org.example.common: trace # 公共模块：如果 common 报错，开启最详细的追踪
  file:
    name: logs/project-run.log # 日志会自动保存到项目根目录下的 logs 文件夹